<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Netflix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allura&family=Anton&family=Cossette+Titre:wght@400;700&family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@400..900&family=Oswald:wght@200..700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Ranchers&display=swap" rel="stylesheet">
    <style>
      :root {
        --background: #100c0a;
        --surface: #1c1613;
        --primary: #E50914;
        --secondary: #e50914;
        --text-light: #fefefe;
        --text-dark: #b3b3b3;
        --border: #3f2d21;
        --danger: #ef4444;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        font-family: 'Inter', sans-serif;
        color: var(--text-light);
        -webkit-tap-highlight-color: transparent;
        animation: body-fade-in 1s ease-out;
        /* Apply background with gradient layered over solid color, and fix it to the viewport */
        background: radial-gradient(ellipse at 50% 30%, rgba(160, 80, 30, 0.22), transparent 70%), var(--background);
        background-attachment: fixed;
        transition: background 0.5s ease;
      }
      body.modal-open {
        overflow: hidden;
      }
      body.kids-mode-bg {
        background: radial-gradient(ellipse at 50% 30%, rgba(45, 105, 195, 0.25), transparent 70%), var(--background);
      }
      /* On smaller screens, reduce the base font size to scale the UI down slightly. */
      @media (max-width: 640px) {
        html {
          font-size: 14px;
        }
      }
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      .no-scrollbar {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }
      #root:empty::before {
        content: "NETFLIX";
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-size: 4rem;
        font-weight: 900;
        letter-spacing: 0.1em;
        color: var(--primary);
        background-color: #000;
      }
      .skeleton {
        background-color: #ffffff0d;
        position: relative;
        overflow: hidden;
      }
      .skeleton::after {
          content: '';
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          background: linear-gradient(90deg, transparent, #ffffff14, transparent);
          animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
          0% { transform: translateX(-100%); }
          100% { transform: translateX(100%); }
      }
      @keyframes double-tap-anim {
        0% { opacity: 0; transform: scale(0.3); }
        25% { opacity: 1; transform: scale(1.2); }
        100% { opacity: 0; transform: scale(1.6); }
      }
      .animate-double-tap {
        animation: double-tap-anim 0.6s ease-out forwards;
      }
      @keyframes slide-in-bottom {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
       @keyframes hero-content-in {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-hero-content-in {
        animation: hero-content-in 1s 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      
      /* New Page Transition */
      @keyframes page-enter-anim {
        from {
          opacity: 0;
          transform: translateY(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-page-enter {
        animation: page-enter-anim 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      
      .interactive-card {
        transition: transform 0.3s ease-out, box-shadow 0.3s ease-out !important;
        will-change: transform;
      }
      .interactive-card .quick-view {
        opacity: 0;
        transition: opacity 0.3s ease-in-out, max-height 0.4s ease-in-out, padding 0.4s ease-in-out;
        max-height: 0;
        overflow: hidden;
        padding-top: 0;
        padding-bottom: 0;
      }

      .interactive-card-container:hover .interactive-card {
        transform: scale(1.1) translateY(-25%);
        z-index: 20;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
      .interactive-card-container:hover .quick-view {
        opacity: 1;
        max-height: 150px;
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }
      .interactive-card-container:hover .interactive-card img {
        border-bottom-left-radius: 0;
        border-bottom-right-radius: 0;
      }
      
      /* Button Active State */
      .btn-press {
          transition: transform 0.1s ease-out, filter 0.2s;
      }
      .btn-press:hover {
          filter: brightness(1.1);
      }
      .btn-press:active {
          transform: scale(0.96);
          filter: brightness(0.95);
      }
      
      /* Details Modal Styles */
      .details-modal-backdrop {
        position: fixed;
        inset: 0;
        background-color: rgba(0,0,0,0.7);
        z-index: 50;
        backdrop-filter: blur(4px);
        animation: fade-in 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .details-modal-backdrop.exiting {
        animation: fade-out 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }

      .details-modal-content {
        position: fixed;
        top: 5vh;
        left: 50%;
        width: 90vw;
        max-width: 850px;
        height: 90vh;
        background-color: var(--background);
        border-radius: 0.375rem;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        z-index: 51;
        animation: modal-scale-in 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        transform: translateX(-50%);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .details-modal-content.exiting {
        animation: modal-scale-out 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      
      .details-modal-content.expanded {
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        max-width: none;
        border-radius: 0;
        transform: none;
      }
      
      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      @keyframes fade-out { from { opacity: 1; } to { opacity: 0; } }

      @keyframes modal-scale-in {
        from { opacity: 0; transform: translateX(-50%) scale(0.9); }
        to { opacity: 1; transform: translateX(-50%) scale(1); }
      }
      @keyframes modal-scale-out {
        from { opacity: 1; transform: translateX(-50%) scale(1); }
        to { opacity: 0; transform: translateX(-50%) scale(0.9); }
      }

      @keyframes slide-in-from-right {
        from { transform: translateX(100%); }
        to { transform: translateX(0); }
      }
      .animate-slide-in-from-right {
        animation: slide-in-from-right 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      }
      @keyframes slide-out-right {
        from { transform: translateX(0); }
        to { transform: translateX(100%); }
      }
      .animate-slide-out-right {
         animation: slide-out-right 0.4s cubic-bezier(0.5, 0, 0.75, 0);
      }

      /* TV Cursor Click Effect */
      @keyframes ripple-effect {
        to {
          transform: translate(-50%, -50%) scale(1.5);
          opacity: 0;
        }
      }
      .animate-ripple {
        animation: ripple-effect 0.4s ease-out forwards;
      }

      @keyframes body-fade-in {
        from { opacity: 0; }
        to { opacity: 1; }
      }
    </style>
